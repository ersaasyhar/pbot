<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Polymarket Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl mb-2">🤖</h1>
            <h2 class="text-2xl font-bold text-blue-400">Bot Terminal Login</h2>
            <p class="text-gray-500 text-sm">Please enter access password</p>
        </div>

        {% if error %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 text-sm px-4 py-3 rounded mb-6">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-6">
                <input type="password" name="password" autofocus
                    placeholder="••••••••"
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition font-mono text-center text-xl tracking-widest">
            </div>
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Enter Terminal
            </button>
        </form>
    </div>
</body>
</html>
